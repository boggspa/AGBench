name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Test (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-latest
          - name: macOS Apple Silicon
            os: macos-15
          - name: macOS Intel
            os: macos-15-intel
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run ci

  notarized-macos-release:
    name: Notarized macOS Release
    runs-on: macos-15
    if: startsWith(github.ref, 'refs/tags/v') && vars.ENABLE_MACOS_NOTARIZED_RELEASE == 'true'
    env:
      CSC_LINK: ${{ secrets.MACOS_CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.MACOS_CSC_KEY_PASSWORD }}
      CSC_NAME: ${{ secrets.MACOS_CSC_NAME }}
      APPLE_KEYCHAIN_PROFILE: ${{ secrets.APPLE_KEYCHAIN_PROFILE }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run security:deps
      - run: npm run build:mac:notarized
      - name: Verify notarized macOS artifacts
        run: |
          set -euo pipefail
          test -d "dist/mac-universal/AGBench.app"
          codesign --verify --deep --strict --verbose=2 "dist/mac-universal/AGBench.app"
          spctl --assess --type execute --verbose=4 "dist/mac-universal/AGBench.app"
          xcrun stapler validate "dist/mac-universal/AGBench.app"
          for artifact in dist/*.dmg; do
            test -f "$artifact"
            xcrun stapler validate "$artifact"
          done
