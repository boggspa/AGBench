    .tile-rim { stroke: currentColor; opacity: 0.26; }
    .tile-label { fill: #6f7685; font: 10px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0; text-anchor: middle; }
