appId: com.chrisizatt.agbench
productName: AGBench
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  - '!dist/**'
  - '!dist-debug/**'
  # Delivery artefacts — without these exclusions, electron-builder
  # recursively bundles the for-tester/ folder (plus any nested build
  # zips inside it) into app.asar. That ballooned 1.0.2's asar to
  # 1.6 GB and made the packaged app fail to launch silently —
  # Electron's asar loader can't mmap arbitrarily large bundles.
  - '!for-tester/**'
  - '!for-tester.zip'
  # Misc top-level artefacts that have shown up in earlier ships.
  - '!*.zip'
  - '!*.dmg'
  # Plan files / claude code agent worktrees from the dev loop.
  - '!.claude/**'
  - '!docs/**'
  # Native/mobile source trees are development inputs only. The mac app
  # receives the release GuiGeminiBridgeDaemon via `mac.extraResources`
  # below; packaging the full Swift/iOS `.build` trees into app.asar
  # bloated debug builds by hundreds of megabytes.
  - '!swift/**'
  - '!ios/**'
  - '!design-assets/**'
asarUnpack:
  - resources/**
  - node_modules/node-pty/**
afterPack: build/validate-native-modules.cjs
win:
  executableName: AGBench
nsis:
  artifactName: AGBench-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
mac:
  entitlementsInherit: build/entitlements.mac.plist
  sign: build/sign-with-identity-hash.cjs
  # extendInfo MUST be a flat dict, not a list-of-dicts. The list form
  # gets serialized into the Info.plist as numbered wrapper keys
  # ("0" => { NSCameraUsageDescription: ... }, "1" => { ... }, …),
  # which means macOS never sees any of the usage-description keys at
  # the root path where it actually checks them. That's why prior
  # builds quietly failed to prompt for permissions and why the
  # _guigemini-quic._udp carrier was being dropped before reaching
  # the daemon: NSBonjourServices was sitting under "5", not at root.
  extendInfo:
    NSCameraUsageDescription: Application requests access to the device's camera.
    NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
    NSLocalNetworkUsageDescription: AGBench discovers and connects to your paired iPhone or iPad on your local network to stream live run events, approval requests, and tool outputs.
    NSScreenCaptureDescription: AGBench captures the window you pick with the macOS screen-sharing picker so the attached AI provider can see it as visual context. Captures are one frame at a time and only run while a window is attached.
    # Phase K4 — AppleScript dispatch into creative apps (Final Cut Pro,
    # Logic Pro) sends AppleEvents from the AGBench process. Hardened-
    # runtime apps need this Info.plist string before the OS will route
    # cross-app automation; missing it means the OS silently rejects
    # every AppleScript call with errAEEventNotPermitted (-1743).
    NSAppleEventsUsageDescription: AGBench sends AppleScript automation commands to Final Cut Pro and Logic Pro on your behalf — only after you approve each action in the in-app modal. Every dispatch is auditable in the approval log.
    NSBonjourServices:
      - _guigemini._tcp
      - _guigemini-quic._udp
  notarize: false
  # Bundle the Swift GuiGeminiBridgeDaemon as an extraResource so the
  # main process can spawn it from the packaged .app. The binary is
  # compiled by `scripts/build-bridge-daemon.cjs` (run via the
  # `prebuild:bridge-daemon` npm script in all mac build targets).
  # macOS-only: the daemon uses Apple Network framework + Bonjour +
  # CryptoKit and is not built on other platforms.
  extraResources:
    - from: swift/GuiGeminiBridge/.build/release/GuiGeminiBridgeDaemon
      to: bridge/GuiGeminiBridgeDaemon
dmg:
  artifactName: AGBench-${version}.${ext}
linux:
  target:
    - AppImage
    - snap
    - deb
  maintainer: electronjs.org
  category: Utility
appImage:
  artifactName: AGBench-${version}.${ext}
npmRebuild: true
detectUpdateChannel: true
generateUpdatesFilesForAllChannels: true
publish:
  provider: github
  owner: chrisizatt
  repo: GUIGemini
  releaseType: release
