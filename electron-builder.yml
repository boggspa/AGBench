appId: com.chrisizatt.agbench
productName: AGBench
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  - '!dist/**'
  - '!dist-debug/**'
asarUnpack:
  - resources/**
  - node_modules/node-pty/**
afterPack: build/validate-native-modules.cjs
win:
  executableName: AGBench
nsis:
  artifactName: AGBench-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
mac:
  entitlementsInherit: build/entitlements.mac.plist
  sign: build/sign-with-identity-hash.cjs
  extendInfo:
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  notarize: false
  # Bundle the Swift GuiGeminiBridgeDaemon as an extraResource so the
  # main process can spawn it from the packaged .app. The binary is
  # compiled by `scripts/build-bridge-daemon.cjs` (run via the
  # `prebuild:bridge-daemon` npm script in all mac build targets).
  # macOS-only: the daemon uses Apple Network framework + Bonjour +
  # CryptoKit and is not built on other platforms.
  extraResources:
    - from: swift/GuiGeminiBridge/.build/release/GuiGeminiBridgeDaemon
      to: bridge/GuiGeminiBridgeDaemon
dmg:
  artifactName: AGBench-${version}.${ext}
linux:
  target:
    - AppImage
    - snap
    - deb
  maintainer: electronjs.org
  category: Utility
appImage:
  artifactName: AGBench-${version}.${ext}
npmRebuild: true
detectUpdateChannel: true
generateUpdatesFilesForAllChannels: true
publish:
  provider: github
  owner: chrisizatt
  repo: GUIGemini
  releaseType: release
