# XcodeGen spec for the TaskWraith iOS companion app.
#   brew install xcodegen
#   cd ios/TaskWraithApp && xcodegen generate && open TaskWraith.xcodeproj
# Then pick your iPhone/iPad (or a simulator) and Run. See README.md for
# device-testing prerequisites (Apple ID in Xcode, Developer Mode on device).
name: TaskWraith
options:
  bundleIdPrefix: com.taskwraith
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
packages:
  TaskWraithKit:
    path: ../TaskWraithKit
targets:
  TaskWraith:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Assets.xcassets
      # Required-reason API declaration (UserDefaults / CA92.1) — App Store
      # submission requirement.
      - path: PrivacyInfo.xcprivacy
    dependencies:
      - package: TaskWraithKit
        product: TaskWraithUI
    info:
      path: Generated/Info.plist
      properties:
        CFBundleDisplayName: TaskWraith
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UILaunchScreen: {}
        # The Mac sends content-available:1 background pushes (wake →
        # resolve → reconnect, see Http2ApnsPusher). iOS silently DROPS
        # silent pushes unless the app declares this mode — without it only
        # visible alert pushes arrive (TestFlight blocker).
        UIBackgroundModes:
          - remote-notification
        # iPhone stays portrait-first; iPad rotates freely (split-view shell).
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSCameraUsageDescription: "TaskWraith uses the camera to scan the pairing QR code shown on your Mac."
        NSLocalNetworkUsageDescription: "TaskWraith connects to the pairing relay on your local network to reach your Mac."
        # ATS: NO global bypass (TestFlight blocker — removed). The scoped
        # local-networking exception covers LAN-relay dev workflows; remote
        # use must be wss:// (e.g. `tailscale cert` for a Tailnet relay).
        # The E2EE layer protects payloads regardless — this is about not
        # exposing handshake metadata + the confirm code to on-path
        # observers, and about App Store policy.
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
    entitlements:
      path: TaskWraith.entitlements
      properties:
        # Flips to `production` automatically when signed for TestFlight /
        # App Store; dev/device builds use the sandbox APNs gateway.
        aps-environment: development
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.taskwraith.companion
        # Pre-wired to the TaskWraith Apple Developer team (same team the Mac
        # app's Developer ID signing uses) so device runs sign automatically —
        # change in Signing & Capabilities if you use a different team.
        DEVELOPMENT_TEAM: 8CZML8FK2D
        CODE_SIGN_STYLE: Automatic
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "0.1.0"
        SWIFT_VERSION: "6.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
