name: GuiGeminiCompanion
options:
  minimumXcodeGenVersion: 2.43.0
settings:
  base:
    SWIFT_VERSION: 6.0
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: <your-team-id>
    MARKETING_VERSION: 0.1.0
    CURRENT_PROJECT_VERSION: 1
packages:
  # Local SwiftPM package containing the library target consumed by the
  # iOS app. The `.` path is relative to this project.yml file.
  GuiGeminiCompanionPackage:
    path: .
targets:
  GuiGeminiCompanion:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - App
    dependencies:
      - package: GuiGeminiCompanionPackage
        product: GuiGeminiCompanionCore
      - target: AGBenchRunActivityExtension
    settings:
      base:
        PRODUCT_NAME: "AGBench"
        PRODUCT_BUNDLE_IDENTIFIER: com.example.AGBench.ios
        INFOPLIST_FILE: App/Info.plist
        CODE_SIGN_ENTITLEMENTS: App/GuiGeminiCompanion.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AGBenchAppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1,2"  # iPhone + iPad
        SUPPORTED_INTERFACE_ORIENTATIONS: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
      configs:
        Debug:
          CODE_SIGN_ENTITLEMENTS: App/GuiGeminiCompanion.entitlements
        Release:
          CODE_SIGN_ENTITLEMENTS: App/GuiGeminiCompanion.release.entitlements
  AGBenchRunActivityExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - Apps/AGBenchRunActivity
    dependencies:
      - package: GuiGeminiCompanionPackage
        product: AGBenchRunActivityShared
    settings:
      base:
        PRODUCT_NAME: "AGBenchRunActivity"
        PRODUCT_BUNDLE_IDENTIFIER: com.example.AGBench.ios.AGBenchRunActivity
        INFOPLIST_FILE: Apps/AGBenchRunActivity/Info.plist
        CODE_SIGN_ENTITLEMENTS: Apps/AGBenchRunActivity/AGBenchRunActivity.entitlements
        SKIP_INSTALL: "NO"
schemes:
  GuiGeminiCompanion:
    build:
      targets:
        GuiGeminiCompanion: all
    run:
      config: Debug
  AGBenchRunActivityExtension:
    build:
      targets:
        AGBenchRunActivityExtension: all
