<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" role="img" aria-labelledby="provider-glyph-claude-title provider-glyph-claude-desc" data-provider="claude" style="color: #D97706; --provider-accent: #D97706;">
  <title id="provider-glyph-claude-title">Claude provider glyph</title>
  <desc id="provider-glyph-claude-desc">Original monoline uneven radial burst mnemonic for Claude. Not an official logo.</desc>
  <style>

  .line {
    fill: none;
    stroke: var(--provider-accent);
    stroke-width: 1.75;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .accent {
    fill: none;
    stroke: var(--provider-accent);
    stroke-width: 1.85;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .fine {
    stroke-width: 1.3;
    opacity: 0.76;
  }

  .soft {
    fill: var(--provider-accent);
    opacity: 0.12;
    stroke: none;
  }

  .dot {
    fill: var(--provider-accent);
    stroke: none;
  }

  </style>

