<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" role="img" aria-labelledby="provider-glyph-kimi-title provider-glyph-kimi-desc" data-provider="kimi" style="color: #84A33B; --provider-accent: #84A33B;">
  <title id="provider-glyph-kimi-title">Kimi provider glyph</title>
  <desc id="provider-glyph-kimi-desc">Original monoline crescent and angled wordmark slash mnemonic for Kimi. Not an official logo.</desc>
  <style>

  .line {
    fill: none;
    stroke: var(--provider-accent);
    stroke-width: 1.75;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .accent {
    fill: none;
    stroke: var(--provider-accent);
    stroke-width: 1.85;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .fine {
    stroke-width: 1.3;
    opacity: 0.76;
  }

  .soft {
    fill: var(--provider-accent);
    opacity: 0.12;
    stroke: none;
  }

  .dot {
    fill: var(--provider-accent);
    stroke: none;
  }

  </style>

