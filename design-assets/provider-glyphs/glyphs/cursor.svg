<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" role="img" aria-labelledby="provider-glyph-cursor-title provider-glyph-cursor-desc" data-provider="cursor" style="color: #E3B91E; --provider-accent: #E3B91E;">
  <title id="provider-glyph-cursor-title">Cursor provider glyph</title>
  <desc id="provider-glyph-cursor-desc">Original monoline pointer with insertion caret mnemonic for Cursor. Not an official logo.</desc>
  <style>

  .line {
    fill: none;
    stroke: var(--provider-accent);
    stroke-width: 1.75;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .accent {
    fill: none;
    stroke: var(--provider-accent);
    stroke-width: 1.85;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .fine {
    stroke-width: 1.3;
    opacity: 0.76;
  }

  .soft {
    fill: var(--provider-accent);
    opacity: 0.12;
    stroke: none;
  }

  .dot {
    fill: var(--provider-accent);
    stroke: none;
  }

  </style>

