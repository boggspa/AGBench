<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" role="img" aria-labelledby="provider-glyph-gemini-title provider-glyph-gemini-desc" data-provider="gemini" style="color: #2563EB; --provider-accent: #2563EB;">
  <title id="provider-glyph-gemini-title">Gemini provider glyph</title>
  <desc id="provider-glyph-gemini-desc">Original monoline offset constellation sparkle mnemonic for Gemini. Not an official logo.</desc>
  <style>

  .line {
    fill: none;
    stroke: var(--provider-accent);
    stroke-width: 1.75;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .accent {
    fill: none;
    stroke: var(--provider-accent);
    stroke-width: 1.85;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .fine {
    stroke-width: 1.3;
    opacity: 0.76;
  }

  .soft {
    fill: var(--provider-accent);
    opacity: 0.12;
    stroke: none;
  }

  .dot {
    fill: var(--provider-accent);
    stroke: none;
  }

  </style>

