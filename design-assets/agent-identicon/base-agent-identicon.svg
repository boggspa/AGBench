<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" role="img" aria-labelledby="base-agent-identicon-title base-agent-identicon-desc">
  <title id="base-agent-identicon-title">Base Agent Identicon</title>
  <desc id="base-agent-identicon-desc">Monochrome monoline suited agent identicon with focused brows, filled sunglasses, and a neck-routed earpiece.</desc>
  <style>
    .line {
      fill: none;
      stroke: currentColor;
      stroke-width: 14;
      stroke-linecap: round;
      stroke-linejoin: round;
      vector-effect: non-scaling-stroke;
    }

    .fine {
      fill: none;
      stroke: currentColor;
      stroke-width: 7;
      stroke-linecap: round;
      stroke-linejoin: round;
      vector-effect: non-scaling-stroke;
      opacity: 0.72;
    }

    .device {
      fill: none;
      stroke: currentColor;
      stroke-width: 15;
      stroke-linecap: round;
      stroke-linejoin: round;
      vector-effect: non-scaling-stroke;
    }

    .brow {
      fill: none;
      stroke: currentColor;
      stroke-width: 16;
      stroke-linecap: round;
      stroke-linejoin: round;
      vector-effect: non-scaling-stroke;
    }

    .lens {
      fill: currentColor;
      stroke: none;
    }

    .accent {
      fill: none;
      stroke: var(--agent-accent, currentColor);
      stroke-width: 10;
      stroke-linecap: round;
      stroke-linejoin: round;
      vector-effect: non-scaling-stroke;
    }
  </style>

