extends: electron-builder.yml
appId: com.chrisizatt.agbench
productName: AGBench Debug
directories:
  output: dist-debug
mac:
  category: public.app-category.developer-tools
  notarize: false
  extendInfo:
    - NSCameraUsageDescription: AGBench Debug requests access to the device's camera.
    - NSMicrophoneUsageDescription: AGBench Debug requests access to the device's microphone.
    - NSDocumentsFolderUsageDescription: AGBench Debug requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: AGBench Debug requests access to the user's Downloads folder.
